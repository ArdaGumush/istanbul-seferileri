<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KARANLIK ŞEHİR — İstanbul İmparatorluğu</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;500;600&display=swap');

  :root{
    --bg-void: #0a0d14;
    --bg-panel: #12161f;
    --bg-panel-raised: #181d29;
    --bg-card: #1d2330;
    --line: #2a3142;
    --line-soft: #1f2531;
    --gold: #c9a24b;
    --gold-bright: #e6c368;
    --blood: #a5342e;
    --blood-bright: #d4453d;
    --ink: #e8e6df;
    --ink-dim: #9098a8;
    --ink-faint: #5c6478;
    --heat-low: #4a7c59;
    --heat-mid: #c9a24b;
    --heat-high: #a5342e;
    --font-display: 'Bebas Neue', sans-serif;
    --font-body: 'Oswald', sans-serif;
    --font-mono: 'IBM Plex Mono', monospace;
  }

  *{ margin:0; padding:0; box-sizing:border-box; }

  html, body{
    height:100%;
    height:100dvh;
    background: var(--bg-void);
    color: var(--ink);
    font-family: var(--font-body);
    overflow: hidden;
  }

  body{
    background-image:
      radial-gradient(ellipse at 20% 0%, rgba(201,162,75,0.05), transparent 50%),
      radial-gradient(ellipse at 80% 100%, rgba(165,52,46,0.06), transparent 50%);
  }

  ::-webkit-scrollbar{ width:8px; height:8px; }
  ::-webkit-scrollbar-track{ background: var(--bg-panel); }
  ::-webkit-scrollbar-thumb{ background: var(--line); border-radius:4px; }
  ::-webkit-scrollbar-thumb:hover{ background: var(--ink-faint); }

  button{ font-family: var(--font-body); cursor:pointer; border:none; }
  button:disabled{ cursor:not-allowed; opacity:0.4; }

  /* ============ LOADING / INTRO ============ */
  #intro-screen{
    position:fixed; inset:0; z-index:1000;
    background: var(--bg-void);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap: 24px;
    transition: opacity 0.8s ease;
  }
  #intro-screen.hidden{ opacity:0; pointer-events:none; }
  .intro-title{
    font-family: var(--font-display);
    font-size: 72px;
    letter-spacing: 6px;
    color: var(--gold-bright);
    text-shadow: 0 0 40px rgba(201,162,75,0.3);
  }
  .intro-sub{
    font-family: var(--font-mono);
    font-size: 13px;
    letter-spacing: 4px;
    color: var(--ink-faint);
    text-transform: uppercase;
  }
  .intro-btn{
    margin-top: 20px;
    padding: 14px 40px;
    background: transparent;
    border: 1px solid var(--gold);
    color: var(--gold-bright);
    font-family: var(--font-mono);
    letter-spacing: 3px;
    font-size: 13px;
    text-transform: uppercase;
    transition: all 0.25s ease;
  }
  .intro-btn:hover{ background: var(--gold); color: var(--bg-void); }

  /* ============ SETUP WIZARD ============ */
  #setup-screen{
    position:fixed; inset:0; z-index:999;
    background: var(--bg-void);
    display:flex; align-items:center; justify-content:center;
    background-image: radial-gradient(ellipse at 50% 0%, rgba(201,162,75,0.06), transparent 55%);
  }
  #setup-card{
    width: 560px; max-width: 92vw; max-height: 88vh;
    overflow-y:auto;
    background: var(--bg-panel);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 32px 36px;
  }
  #setup-progress{
    display:flex; gap:6px;
    margin-bottom: 26px;
  }
  .setup-dot{
    flex:1; height:3px;
    background: var(--line);
    border-radius: 2px;
    transition: background 0.3s ease;
  }
  .setup-dot.done{ background: var(--gold); }
  .setup-dot.current{ background: var(--gold-bright); }

  .setup-eyebrow{
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 2.5px;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .setup-title{
    font-family: var(--font-display);
    font-size: 34px;
    letter-spacing: 1px;
    color: var(--ink);
    margin-bottom: 8px;
  }
  .setup-desc{
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--ink-faint);
    line-height: 1.6;
    margin-bottom: 24px;
  }

  .setup-input{
    width:100%;
    background: var(--bg-panel-raised);
    border: 1px solid var(--line);
    color: var(--ink);
    font-family: var(--font-body);
    font-size: 15px;
    padding: 12px 14px;
    border-radius: 6px;
    margin-bottom: 14px;
  }
  .setup-input:focus{ outline:none; border-color: var(--gold); }
  .setup-label{
    font-family: var(--font-mono);
    font-size: 10.5px;
    letter-spacing: 1px;
    color: var(--ink-faint);
    text-transform: uppercase;
    margin-bottom: 6px;
    display:block;
  }

  .option-card{
    background: var(--bg-card);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 14px 16px;
    margin-bottom: 10px;
    cursor:pointer;
    transition: all 0.2s ease;
  }
  .option-card:hover{ border-color: var(--ink-faint); }
  .option-card.selected{ border-color: var(--gold); background: rgba(201,162,75,0.08); }
  .option-title{
    font-family: var(--font-body);
    font-weight:600;
    font-size: 15px;
    display:flex; align-items:center; justify-content:space-between;
    margin-bottom: 5px;
  }
  .option-title .check{ color: var(--gold-bright); opacity:0; }
  .option-card.selected .check{ opacity:1; }
  .option-desc{
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--ink-faint);
    line-height: 1.5;
    margin-bottom: 8px;
  }
  .option-buff{
    font-family: var(--font-mono);
    font-size: 10.5px;
    color: var(--gold-bright);
  }
  .option-drawback{
    font-family: var(--font-mono);
    font-size: 10.5px;
    color: var(--blood-bright);
    margin-top: 2px;
  }

  .setup-nav{
    display:flex; justify-content:space-between;
    margin-top: 26px;
    gap: 12px;
  }
  .setup-nav .btn{ padding: 11px 24px; font-size: 12px; }
  .setup-summary-row{
    display:flex; justify-content:space-between;
    padding: 10px 0;
    border-bottom: 1px solid var(--line-soft);
    font-family: var(--font-mono);
    font-size: 12px;
  }
  .setup-summary-row:last-child{ border-bottom:none; }
  .setup-summary-row .label{ color: var(--ink-faint); }
  .setup-summary-row .value{ color: var(--gold-bright); font-weight:600; }

  /* ============ APP SHELL ============ */
  #app{
    height:100vh;
    height:100dvh;
    display:grid;
    grid-template-rows: 56px 1fr;
    min-height: 0;
  }

  /* ---- TOP BAR ---- */
  #topbar{
    display:flex; align-items:center;
    padding: 0 20px;
    background: var(--bg-panel);
    border-bottom: 1px solid var(--line);
    gap: 28px;
  }
  #topbar .brand{
    font-family: var(--font-display);
    font-size: 22px;
    letter-spacing: 2px;
    color: var(--gold-bright);
    margin-right: auto;
  }
  .stat-chip{
    display:flex; align-items:center; gap:8px;
    font-family: var(--font-mono);
    font-size: 13px;
    color: var(--ink-dim);
  }
  .stat-chip .val{ color: var(--ink); font-weight:600; }
  .stat-chip.cash .val{ color: var(--gold-bright); }
  #heat-chip{ display:flex; align-items:center; gap:8px; }
  #heat-bar-track{
    width: 90px; height: 8px;
    background: var(--bg-void);
    border-radius: 4px;
    overflow:hidden;
    border: 1px solid var(--line);
  }
  #heat-bar-fill{
    height:100%; width:0%;
    background: linear-gradient(90deg, var(--heat-low), var(--heat-mid), var(--heat-high));
    transition: width 0.5s ease;
  }
  #clock-chip{
    font-family: var(--font-mono);
    font-size: 13px;
    color: var(--ink-dim);
    padding-left: 16px;
    border-left: 1px solid var(--line);
  }
  #clock-chip .val{ color: var(--gold-bright); }
  #speed-controls{ display:flex; gap:4px; }
  .speed-btn{
    width:28px; height:28px;
    background: var(--bg-panel-raised);
    border: 1px solid var(--line);
    color: var(--ink-dim);
    font-family: var(--font-mono);
    font-size:12px;
    border-radius:4px;
  }
  .speed-btn.active{ background: var(--gold); color: var(--bg-void); border-color: var(--gold); }

  /* ---- MAIN LAYOUT: LEFT MAP + RIGHT PANEL ---- */
  #main{
    display:grid;
    grid-template-columns: 1fr 380px;
    overflow:hidden;
    min-height: 0;
  }

  #map-wrap{
    position:relative;
    overflow:hidden;
    background: var(--bg-void);
  }
  #map-bg{
    position:absolute; inset:0;
    width:100%; height:100%;
    object-fit: contain;
    object-position: center;
    opacity: 0.9;
  }
  #map-svg{ position:absolute; inset:0; width:100%; height:100%; display:block; z-index:2; }
  .water{ fill: #0d1622; }
  .district-shape{
    fill: var(--bg-panel-raised);
    stroke: var(--line);
    stroke-width: 0.3;
    transition: fill 0.3s ease, stroke 0.3s ease;
    cursor:pointer;
  }
  .district-shape:hover{ stroke: var(--gold); stroke-width: 0.4; }
  .district-shape.owned{ fill: rgba(201,162,75,0.18); stroke: var(--gold); }
  .district-shape.rival{ fill: rgba(165,52,46,0.14); }
  .district-shape.selected{ stroke: var(--gold-bright); stroke-width: 0.6; }

  .district-node{ cursor:pointer; }
  .district-dot{
    r: 2.2;
    fill: var(--bg-panel);
    stroke: var(--ink-faint);
    stroke-width: 0.4;
    transition: all 0.3s ease;
  }
  .district-dot.owned{ fill: var(--gold); stroke: var(--gold-bright); }
  .district-dot.rival{ fill: var(--blood); stroke: var(--blood-bright); }
  .district-dot.selected{ stroke: var(--ink); stroke-width: 0.6; }
  .district-pulse{
    r: 2.2; fill: none;
    stroke: var(--blood);
    stroke-width: 0.5;
    opacity: 0;
  }
  .district-pulse.active{ animation: pulse-heat 2.2s ease-out infinite; }
  @keyframes pulse-heat{
    0%{ r:2.2; opacity:0.7; }
    100%{ r:6; opacity:0; }
  }
  .district-label{
    font-family: var(--font-mono);
    font-size: 2.4px;
    fill: var(--ink-dim);
    letter-spacing: 0.02px;
    pointer-events: none;
    text-anchor: middle;
    paint-order: stroke;
    stroke: #05070b;
    stroke-width: 0.5px;
  }
  .district-label.owned{ fill: var(--gold-bright); font-weight:600; }
  .map-edge{ stroke: var(--gold); stroke-width:0.3; fill:none; opacity:0.35; }

  #map-legend{
    position:absolute; bottom:16px; left:16px;
    display:flex; gap:16px;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--ink-faint);
    background: rgba(10,13,20,0.85);
    padding: 8px 14px;
    border-radius: 6px;
    border: 1px solid var(--line-soft);
  }
  .legend-item{ display:flex; align-items:center; gap:6px; }
  .legend-dot{ width:9px; height:9px; border-radius:50%; }

  /* ---- RIGHT PANEL ---- */
  #side-panel{
    background: var(--bg-panel);
    border-left: 1px solid var(--line);
    display:flex; flex-direction:column;
    overflow:hidden;
    min-height: 0;
  }
  #tabs{
    display:flex;
    border-bottom: 1px solid var(--line);
    flex-shrink:0;
  }
  .tab-btn{
    flex:1;
    background: transparent;
    color: var(--ink-faint);
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.5px;
    padding: 12px 4px;
    border-bottom: 2px solid transparent;
    text-transform: uppercase;
  }
  .tab-btn.active{ color: var(--gold-bright); border-bottom-color: var(--gold); }
  .tab-btn:hover:not(.active){ color: var(--ink-dim); }

  #panel-content{
    flex:1;
    min-height: 0;
    overflow-y:auto;
    -webkit-overflow-scrolling: touch;
    padding: 18px;
  }

  .panel-title{
    font-family: var(--font-display);
    font-size: 26px;
    letter-spacing: 1px;
    color: var(--ink);
    margin-bottom: 4px;
  }
  .panel-subtitle{
    font-family: var(--font-mono);
    font-size: 11.5px;
    color: var(--ink-faint);
    margin-bottom: 18px;
    line-height:1.5;
  }

  .section-label{
    font-family: var(--font-mono);
    font-size: 10.5px;
    letter-spacing: 1.5px;
    color: var(--gold);
    text-transform: uppercase;
    margin: 20px 0 10px;
    display:flex; align-items:center; gap:8px;
  }
  .section-label::after{
    content:''; flex:1; height:1px; background: var(--line);
  }
  .section-label:first-child{ margin-top:0; }

  .card{
    background: var(--bg-card);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 14px;
    margin-bottom: 10px;
  }
  .card-row{
    display:flex; justify-content:space-between; align-items:center;
    margin-bottom: 8px;
  }
  .card-row:last-child{ margin-bottom:0; }
  .card-title{
    font-family: var(--font-body);
    font-weight:600;
    font-size: 14.5px;
    display:flex; align-items:center; gap:8px;
  }
  .card-desc{
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--ink-faint);
    line-height:1.5;
    margin-bottom: 10px;
  }
  .card-stat{
    font-family: var(--font-mono);
    font-size: 11.5px;
    color: var(--ink-dim);
  }
  .card-stat .num{ color: var(--ink); font-weight:600; }
  .card-stat.gold .num{ color: var(--gold-bright); }
  .card-stat.blood .num{ color: var(--blood-bright); }

  .btn{
    font-family: var(--font-mono);
    font-size: 11.5px;
    letter-spacing: 0.5px;
    padding: 9px 16px;
    border-radius: 5px;
    text-transform: uppercase;
    transition: all 0.2s ease;
  }
  .btn-gold{ background: var(--gold); color: var(--bg-void); font-weight:600; }
  .btn-gold:hover:not(:disabled){ background: var(--gold-bright); }
  .btn-outline{ background: transparent; border: 1px solid var(--line); color: var(--ink-dim); }
  .btn-outline:hover:not(:disabled){ border-color: var(--gold); color: var(--gold-bright); }
  .btn-blood{ background: var(--blood); color: var(--ink); font-weight:600; }
  .btn-blood:hover:not(:disabled){ background: var(--blood-bright); }
  .btn-full{ width:100%; }
  .btn-sm{ padding:6px 10px; font-size:10.5px; }

  .progress-track{
    width:100%; height:6px;
    background: var(--bg-void);
    border-radius:3px;
    overflow:hidden;
    margin: 6px 0;
  }
  .progress-fill{
    height:100%;
    background: var(--gold);
    transition: width 0.3s ease;
  }

  .empty-state{
    text-align:center;
    padding: 40px 20px;
    color: var(--ink-faint);
    font-family: var(--font-mono);
    font-size: 12px;
    line-height:1.7;
  }

  select, input[type=number]{
    background: var(--bg-panel-raised);
    border: 1px solid var(--line);
    color: var(--ink);
    font-family: var(--font-mono);
    font-size: 12px;
    padding: 7px 10px;
    border-radius: 5px;
    width:100%;
  }

  .role-slot{
    display:flex; align-items:center; gap:8px;
    padding: 8px 10px;
    background: var(--bg-panel-raised);
    border: 1px solid var(--line);
    border-radius: 6px;
    margin-bottom:6px;
    font-family: var(--font-mono);
    font-size: 11.5px;
  }
  .role-slot.filled{ border-color: var(--gold); }
  .role-slot select{ flex:1; padding:5px 8px; }

  .toast-stack{
    position:fixed; top:66px; right:16px; z-index:900;
    display:flex; flex-direction:column; gap:8px;
    max-width: 320px;
  }
  .toast{
    background: var(--bg-panel-raised);
    border: 1px solid var(--line);
    border-left: 3px solid var(--gold);
    padding: 12px 14px;
    border-radius: 6px;
    font-family: var(--font-mono);
    font-size: 12px;
    line-height:1.5;
    animation: toast-in 0.3s ease;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  }
  .toast.negative{ border-left-color: var(--blood); }
  .toast.positive{ border-left-color: var(--heat-low); }
  @keyframes toast-in{
    from{ transform: translateX(30px); opacity:0; }
    to{ transform: translateX(0); opacity:1; }
  }
  .toast-title{ font-weight:600; color: var(--ink); margin-bottom:3px; }
  .toast-body{ color: var(--ink-dim); }

  .badge{
    display:inline-flex; align-items:center;
    font-family: var(--font-mono);
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 4px;
    background: var(--bg-panel-raised);
    color: var(--ink-faint);
    border: 1px solid var(--line);
  }
  .badge.gold{ color: var(--gold-bright); border-color: var(--gold); }
  .badge.blood{ color: var(--blood-bright); border-color: var(--blood); }

  #district-modal-backdrop{
    position:fixed; inset:0; z-index:800;
    background: rgba(5,7,11,0.7);
    backdrop-filter: blur(2px);
    display:none;
    align-items:center; justify-content:center;
  }
  #district-modal-backdrop.open{ display:flex; }
  #district-modal{
    width: 420px; max-height: 80vh;
    overflow-y:auto;
    background: var(--bg-panel);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 22px;
  }

  .close-x{
    position:absolute; top:14px; right:14px;
    background:transparent; color:var(--ink-faint);
    font-size:20px; line-height:1;
    width:28px; height:28px;
  }
  .close-x:hover{ color: var(--ink); }

/* ===== COMBAT (Bölge Saldırısı vb.) EMBEDDED STİLLERİ ===== */
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Oswald:wght@400;500;600&display=swap');
  #cb-embedded-overlay *{ box-sizing:border-box; }
  #cb-embedded-overlay{
    margin:0; background:#0a0d14; color:#e8e6df;
    font-family:'Oswald', sans-serif;
    display:none; grid-template-columns: 180px 1fr 180px; grid-template-rows: 1fr 220px;
    position:fixed; inset:0; z-index:900;
    gap:8px; padding:8px;
    overflow: hidden;
  }
  #cb-embedded-overlay.active{ display:grid; }
  #cb-left, #cb-right{
    background:#12161f; border:1px solid #2a3142; border-radius:8px;
    padding:8px; overflow-y:auto; grid-row: 1;
  }
  #cb-left{ grid-column:1; }
  #cb-right{ grid-column:3; }
  #cb-map-wrap{ grid-column:2; grid-row:1; background:#05070b; border:1px solid #2a3142; border-radius:8px; overflow:hidden; touch-action:none; position:relative; }
  #cb-grid-container{ position:absolute; top:0; left:0; transform-origin: 0 0; will-change: transform; }
  #cb-zoom-controls{ position:absolute; bottom:8px; right:8px; z-index:10; display:flex; flex-direction:column; gap:4px; }
  #cb-zoom-controls button{ width:34px; height:34px; padding:0; font-size:16px; font-weight:600; }
  #cb-bottom{ grid-column:1/4; grid-row:2; background:#12161f; border:1px solid #2a3142; border-radius:8px; padding:10px; display:flex; gap:12px; max-height: 45vh; overflow-y: auto; }

  #cb-grid{ display:grid; }
  .cb-tile{ width:30px; height:30px; box-sizing:border-box; border:1px solid #05070b; position:relative; touch-action: manipulation; }
  .cb-tile.floor{ background:#1d2330; background-size: cover; }
  .cb-tile.floor-tex-1{ background-image: url('texture/floor_1.png'); }
  .cb-tile.floor-tex-2{ background-image: url('texture/floor_2.png'); }
  .cb-tile.floor-tex-3{ background-image: url('texture/floor_3.png'); }
  .cb-tile.floor-tex-4{ background-image: url('texture/floor_4.png'); }
  .cb-tile.wall{ background:#3a3226; background-size:cover; background-position:center; }

  /* Gemini duvar/zemin seti - köşe/kenar mantıklı, koyu tema */
  .cb-tile.gfloor{ background-image: url('texture/gemini/floor_plain.png'); background-size:cover; }
  .cb-tile.wall-edge-left{ background-image: url('texture/final_wall_leftedge.png'); }
  .cb-tile.wall-edge-right{ background-image: url('texture/final_wall_rightedge_rotated.png'); }
  .cb-tile.wall-mid{ background-image: url('texture/final_wall_midbrick.png'); }
  .cb-tile.obstacle{ background:#4a4438; }
  .cb-tile.door{ background:#5a4a35; }
  .cb-tile.entrance{ background:#7a3a2a; }
  .cb-tile.vault_door{ background:#c9a24b; }
  .cb-tile.treasure{ background:#8b6538; }
  .cb-breach-marker{
    position:absolute; inset:6px; border-radius:3px;
    background:#d4453d; opacity:0.85;
    animation: cb-breach-pulse 1s ease-in-out infinite;
  }
  @keyframes cb-breach-pulse{
    0%, 100%{ opacity:0.5; }
    50%{ opacity:0.95; }
  }
  .cb-tile.hidden{ filter: brightness(0.55) saturate(0.5); }
  .cb-tile.visible-empty{ filter:brightness(1.15); }

  .cb-unit-marker{
    position:absolute; inset:2px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-size:9px; font-weight:600; cursor:pointer;
    font-family:'IBM Plex Mono', monospace;
  }
  .cb-unit-marker.player{ background:#c9a24b; color:#0a0d14; }
  .cb-unit-marker.enemy{ background:#a5342e; color:#e8e6df; }
  .cb-unit-marker.down{ opacity:0.4; }
  .cb-unit-marker.dead{ background:#1a1a1a !important; opacity:0.7; border:1px solid #444; }
  .cb-unit-marker.selected{ outline:2px solid #e6c368; }

  .cb-dir-arrow{ position:absolute; width:0; height:0; }

  .cb-reachable{ outline: 2px solid #4a9c5d; outline-offset: -2px; cursor:pointer; background:rgba(74,156,93,0.12) !important; }
  .cb-placeable{ outline: 2px solid #2980b9; outline-offset: -2px; cursor:pointer; background:rgba(41,128,185,0.15) !important; }

  #cb-placement-panel{ display:none; }
  #cb-placement-panel.active{ display:block; }
  .cb-roster-item{
    background:#1d2330; border:1px solid #2a3142; border-radius:6px;
    padding:6px 8px; margin-bottom:6px; cursor:pointer; font-size:11px;
    font-family:'IBM Plex Mono', monospace;
  }
  .cb-roster-item.picking{ border-color:#2980b9; background:rgba(41,128,185,0.15); }
  .cb-roster-item.placed{ opacity:0.5; }

  .cb-laser-line{ stroke-linecap: round; opacity: 0; }
  .cb-laser-line.firing{ animation: cb-laser-fade 0.5s ease-out forwards; }
  @keyframes cb-laser-fade{
    0%{ opacity: 1; }
    70%{ opacity: 0.9; }
    100%{ opacity: 0; }
  }
  .cb-vision{ box-shadow: inset 0 0 0 1px rgba(230,195,104,0.3); }

  .cb-unit-card{
    background:#1d2330; border:1px solid #2a3142; border-radius:6px;
    padding:6px 8px; margin-bottom:6px; cursor:pointer; font-size:11px;
    font-family:'IBM Plex Mono', monospace;
  }
  .cb-unit-card.current{ border-color:#c9a24b; }
  .cb-unit-card .name{ font-weight:600; margin-bottom:3px; }
  .cb-unit-card .hpbar{ height:4px; background:#05070b; border-radius:2px; overflow:hidden; margin:3px 0; }
  .cb-unit-card .hpfill{ height:100%; background:#a5342e; }

  #cb-popover{
    position:fixed; z-index:50; background:#181d29; border:1px solid #c9a24b;
    border-radius:8px; padding:12px; font-size:12px; font-family:'IBM Plex Mono', monospace;
    display:none; width:220px;
  }
  #cb-popover button{ margin-top:6px; width:100%; }

  #cb-embedded-overlay button{
    background:#c9a24b; color:#0a0d14; border:none; border-radius:5px;
    padding:6px 10px; font-family:'IBM Plex Mono', monospace; font-size:11px; cursor:pointer;
  }
  #cb-embedded-overlay button:disabled{ opacity:0.3; cursor:not-allowed; }
  #cb-embedded-overlay button.secondary{ background:#2a3142; color:#e8e6df; }
  #cb-embedded-overlay button.mode-active{ background:#4a9c5d; color:#0a0d14; box-shadow: 0 0 0 2px #6bc47f; }

  #cb-log{ flex:1; max-height: 42vh; overflow-y:auto; font-family:'IBM Plex Mono', monospace; font-size:10.5px; color:#9098a8; }
  #cb-actions{ width:260px; flex-shrink:0; display:flex; flex-direction:column; gap:6px; }
  #cb-actions > div{ flex-wrap: wrap; }
  #cb-actions button{ font-size: 10.5px; padding: 5px 8px; }
  #cb-bodyparts{ display:flex; gap:4px; flex-wrap:wrap; }
  #cb-bodyparts button{ flex:1; min-width:60px; }

  #cb-embedded-overlay h3{ font-size:11px; letter-spacing:1px; color:#c9a24b; text-transform:uppercase; margin:4px 0; }
</style>

</head>
<body>

<div id="cb-embedded-overlay">
<div id="cb-left"><h3>Müttefikler</h3><div id="cb-left-list"></div></div>
<div id="cb-map-wrap">
  <div id="cb-grid-container" style="position:relative;"><div id="cb-grid"></div><svg id="cb-laser-overlay" style="position:absolute; inset:0; pointer-events:none;"></svg></div>
  <div id="cb-zoom-controls">
    <button id="cb-zoom-in" class="secondary">+</button>
    <button id="cb-zoom-out" class="secondary">−</button>
    <button id="cb-zoom-reset" class="secondary" style="font-size:11px;">⟳</button>
  </div>
</div>
<div id="cb-right">
  <div id="cb-haul-panel" style="display:none; margin-bottom:12px; padding:8px; background:#1a2016; border:1px solid #4a9c5d; border-radius:4px;">
    <div style="font-size:10px; color:#9098a8; text-transform:uppercase; letter-spacing:1px;">Total Haul</div>
    <div id="cb-haul-extracted" style="font-size:16px; color:#6bc47f; font-weight:600;">0 TL</div>
    <div style="font-size:10px; color:#9098a8; margin-top:4px;">Mekanda Kalan</div>
    <div id="cb-haul-remaining" style="font-size:13px; color:#c9a24b;">0 TL</div>
  </div>
  <h3>Düşmanlar</h3><div id="cb-right-list"></div>
</div>

<div id="cb-bottom">
  <div id="cb-placement-panel">
    <h3>Ekibini Yerleştir</h3>
    <div id="cb-roster-list"></div>
    <button id="cb-btn-start-ambush">Pusuyu Başlat</button>
  </div>
  <div id="cb-actions">
    <h3>Sıra: <span id="cb-current-name">-</span> (Round <span id="cb-round">1</span>)</h3>
    <div style="display:flex; gap:6px;">
      <button id="cb-btn-move">Hareket Modu</button>
      <button id="cb-btn-fire">Ateş Et</button>
      <button id="cb-btn-suppress" class="secondary" style="display:none;">Bastırma Ateşi</button>
      <button id="cb-btn-reload">Şarjör Değiştir</button>
      <button id="cb-btn-cover" class="secondary">Siper Al</button>
      <button id="cb-btn-consumables" class="secondary">Consumables</button>
      <button id="cb-btn-loot" class="secondary">Malzeme Al</button>
      <button id="cb-btn-borrow-ammo" class="secondary">Mermi Ödünç Al</button>
      <button id="cb-btn-vault" class="secondary" style="display:none;">Kasayı Aç</button>
      <button id="cb-btn-pickup" class="secondary" style="display:none;">Eşyayı Çantana Koy</button>
      <button id="cb-btn-pickup-dropped" class="secondary" style="display:none;">Yerden Ganimet Al</button>
      <button id="cb-btn-flee" class="secondary">Kaç</button>
      <button id="cb-btn-end" class="secondary">Sırayı Bitir</button>
    </div>
    <div id="cb-consumable-menu" style="display:none; gap:6px; flex-wrap:wrap;"></div>
    <div style="display:flex; gap:6px;">
      <span style="font-size:10.5px; color:#9098a8; align-self:center;">Bakış:</span>
      <button class="secondary" data-turn="up">▲</button>
      <button class="secondary" data-turn="down">▼</button>
      <button class="secondary" data-turn="left">◀</button>
      <button class="secondary" data-turn="right">▶</button>
    </div>
    <div id="cb-bodyparts" style="display:none;">
      <button data-part="bas">Baş</button>
      <button data-part="gogus">Göğüs</button>
      <button data-part="karin">Karın</button>
      <button data-part="kol">Kol</button>
      <button data-part="bacak">Bacak</button>
    </div>
    <div style="font-size:10.5px; color:#9098a8;" id="cb-status-line"></div>
  </div>
  <div id="cb-log"></div>
</div>

<div id="cb-popover"></div>

<div id="cb-aftermath-overlay" style="display:none; position:fixed; inset:0; background:rgba(5,7,11,0.92); z-index:100; align-items:center; justify-content:center;">
  <div id="cb-aftermath-panel" style="width:420px; max-height:85vh; overflow-y:auto; background:#12161f; border:1px solid #2a3142; border-radius:10px; padding:20px; font-family:'IBM Plex Mono', monospace;"></div>
</div>
</div>

<div id="intro-screen">
  <div class="intro-title">KARANLIK ŞEHİR</div>
  <div class="intro-sub">İstanbul'un Gölgelerinde Bir İmparatorluk Kur</div>
  <button class="intro-btn" id="continue-btn" style="display:none; margin-bottom:10px;">Devam Et</button>
  <button class="intro-btn" id="start-btn">Yeni Oyun</button>
</div>

<div id="setup-screen" style="display:none;">
  <div id="setup-card">
    <div id="setup-progress"></div>
    <div id="setup-step-content"></div>
  </div>
</div>

<div id="app" style="display:none;">
  <div id="topbar">
    <div class="brand" id="topbar-brand">KARANLIK ŞEHİR</div>
    <div class="stat-chip cash">NAKİT <span class="val" id="stat-cash">₺0</span></div>
    <div class="stat-chip">BÖLGE <span class="val" id="stat-districts">0</span></div>
    <div class="stat-chip">EKİP <span class="val" id="stat-crew">0</span></div>
    <div id="heat-chip" class="stat-chip">
      ISI <div id="heat-bar-track"><div id="heat-bar-fill"></div></div>
      <span class="val" id="heat-value">0</span>
    </div>
    <div id="clock-chip">Gün <span class="val" id="clock-day">1</span> · <span class="val" id="clock-time">08:00</span></div>
    <div id="speed-controls">
      <button class="speed-btn" data-speed="0">⏸</button>
      <button class="speed-btn active" data-speed="1">▶</button>
      <button class="speed-btn" data-speed="2">▶▶</button>
    </div>
  </div>

  <div id="main">
    <div id="map-wrap">
      <img id="map-bg" src="istanbul-map-bg.jpg" alt="">
      <svg id="map-svg" viewBox="0 0 131.2 81.6" preserveAspectRatio="xMidYMid meet"></svg>
      <div id="map-legend">
        <div class="legend-item"><div class="legend-dot" style="background:var(--gold)"></div>Senin bölgen</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--blood)"></div>Rakip çete</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--bg-panel-raised);border:1px solid var(--ink-faint)"></div>Boş bölge</div>
      </div>
    </div>

    <div id="side-panel">
      <div id="tabs">
        <button class="tab-btn active" data-tab="district">Bölge</button>
        <button class="tab-btn" data-tab="drugs">Üretim</button>
        <button class="tab-btn" data-tab="heist">Soygun</button>
        <button class="tab-btn" data-tab="armory">Silahlar</button>
        <button class="tab-btn" data-tab="garage">Garaj</button>
        <button class="tab-btn" data-tab="crew">Ekip</button>
        <button class="tab-btn" data-tab="empire">İmparatorluk</button>
      </div>
      <div id="panel-content"></div>
    </div>
  </div>
</div>

<div class="toast-stack" id="toast-stack"></div>

<script src="game-data.js"></script>
<script src="road-network.js"></script>
<script src="combat/combat-data.js"></script>
<script src="combat/heist-map-templates.js"></script>
<script src="combat/combat-engine.js"></script>
<script src="combat/combat-ui-embedded.js"></script>
<script src="game-engine.js"></script>
</body>
</html>
